name: quality

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rebuild material index
        run: python official_viewer/build_materials_data.py

      - name: Report material index drift
        run: |
          if ! git diff --quiet -- official_viewer/materials-data.js; then
            echo "::warning file=official_viewer/materials-data.js::Rebuilding the material index changed the generated file in CI. The validation step will run against the regenerated index."
            git diff --stat -- official_viewer/materials-data.js
          fi

      - name: Validate project quality gates
        run: python scripts/validate_physx_omni_quality.py
